name: CI

# FROZEN: CI is disabled until source-build pipeline replaces LFS artifacts.
# The old workflow fetched .a files via Git LFS / media.githubusercontent.com,
# but LFS has been removed from this repo. To re-enable, implement a CI job
# that builds GhosttyKit from source (checkout ghostty, zig build, copy
# xcframework) instead of downloading pre-built binaries.
#
# Tracking issue: see "CI freeze: replace LFS artifact pipeline with
# source-build CI" on daiimus/geistty.
#
# To run manually for testing: Actions → CI → Run workflow
on:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build & Test
    runs-on: macos-15

    env:
      DEVELOPER_DIR: /Applications/Xcode_26.3.app/Contents/Developer
      DESTINATION: "platform=iOS Simulator,name=iPhone 17 Pro"
      PROJECT: Geistty/Geistty.xcodeproj
      SCHEME: Geistty

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # TODO: Add source-build step here when CI is unfrozen.
      # This step should:
      #   1. Checkout daiimus/ghostty @ ios-external-backend
      #   2. Install Zig 0.15.2
      #   3. zig build -Demit-xcframework=true -Dxcframework-target=universal
      #   4. Copy xcframework to Geistty/Frameworks/
      #   5. Rename module.modulemap → GhosttyKit.modulemap

      - name: Resolve packages
        run: |
          xcodebuild -resolvePackageDependencies \
            -project "$PROJECT"

      - name: Build
        run: |
          xcodebuild build \
            -project "$PROJECT" \
            -scheme "$SCHEME" \
            -destination "$DESTINATION" \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO \
            | xcbeautify

      - name: Test
        run: |
          xcodebuild test \
            -project "$PROJECT" \
            -scheme "$SCHEME" \
            -destination "$DESTINATION" \
            -only-testing:GeisttyTests \
            CODE_SIGNING_ALLOWED=NO \
            | xcbeautify
