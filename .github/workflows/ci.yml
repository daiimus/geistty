name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build & Test
    runs-on: macos-15

    env:
      DEVELOPER_DIR: /Applications/Xcode_26.3.app/Contents/Developer
      DESTINATION: "platform=iOS Simulator,name=iPhone 17 Pro"
      PROJECT: Geistty/Geistty.xcodeproj
      SCHEME: Geistty

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Resolve packages
        run: |
          xcodebuild -resolvePackageDependencies \
            -project "$PROJECT"

      - name: Build
        run: |
          xcodebuild build \
            -project "$PROJECT" \
            -scheme "$SCHEME" \
            -destination "$DESTINATION" \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO \
            | xcbeautify

      - name: Test
        run: |
          xcodebuild test \
            -project "$PROJECT" \
            -scheme "$SCHEME" \
            -destination "$DESTINATION" \
            -only-testing:GeisttyTests \
            CODE_SIGNING_ALLOWED=NO \
            | xcbeautify
