<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <!-- Chill lo-fi vaporwave purple/teal gradient -->
    <linearGradient id="outerGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6b5b95"/>
      <stop offset="100%" style="stop-color:#4a7c8c"/>
    </linearGradient>
    
    <!-- Soft night background -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2d2640"/>
      <stop offset="100%" style="stop-color:#1a1a2a"/>
    </linearGradient>
    
    <!-- Soft off-white ghost -->
    <linearGradient id="ghostGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f5f0f8"/>
      <stop offset="100%" style="stop-color:#e8e0f0"/>
    </linearGradient>
  </defs>
  
  <!-- Soft outer glow - lo-fi purple/teal - extended tail -->
  <path d="
    M 512 40
    C 180 40, 80 200, 80 460
    L 80 720
    L 80 900
    L 150 800
    L 220 900
    L 290 800
    L 360 900
    L 430 800
    L 500 900
    L 570 800
    L 640 900
    L 710 800
    L 780 900
    L 850 800
    L 920 900
    L 920 460
    C 920 200, 820 40, 512 40
    Z
  " fill="url(#outerGrad)"/>
  
  <!-- Dark inner outline - extended tail -->
  <path d="
    M 512 80
    C 210 80, 120 230, 120 460
    L 120 700
    L 120 860
    L 180 770
    L 240 860
    L 300 770
    L 360 860
    L 420 770
    L 480 860
    L 540 770
    L 600 860
    L 660 770
    L 720 860
    L 780 770
    L 840 860
    L 840 460
    C 840 230, 750 80, 512 80
    Z
  " fill="url(#bgGrad)"/>
  
  <!-- Soft off-white ghost body - extended tail -->
  <path d="
    M 512 120
    C 240 120, 160 260, 160 460
    L 160 680
    L 160 820
    L 210 740
    L 260 820
    L 310 740
    L 360 820
    L 410 740
    L 460 820
    L 510 740
    L 560 820
    L 610 740
    L 660 820
    L 710 740
    L 760 820
    L 810 740
    L 860 820
    L 860 460
    C 860 260, 780 120, 512 120
    Z
  " fill="url(#ghostGrad)"/>
  
  <!-- Left eye: lowercase 'o' - soft muted purple, stretched vertically -->
  <text x="340" y="500" font-family="Monaco, 'Courier New', monospace" font-size="220" font-weight="bold" fill="#4a4060" text-anchor="middle" transform="scale(1, 1.3) translate(0, -115)">o</text>
  
  <!-- Right eye: null character ∅ - soft muted purple, stretched vertically -->
  <text x="680" y="500" font-family="Monaco, 'Courier New', monospace" font-size="220" font-weight="bold" fill="#4a4060" text-anchor="middle" transform="scale(1, 1.3) translate(0, -115)">∅</text>
  
  <!-- Horizontal smirk using tilde ~ -->
  <text x="510" y="620" font-family="Monaco, 'Courier New', monospace" font-size="120" font-weight="bold" fill="#4a4060" text-anchor="middle">~</text>
</svg>
